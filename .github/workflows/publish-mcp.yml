name: Publish MCP package and registry listing

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: python -m pip install --upgrade build jsonschema

      - name: Install project dependencies
        run: python -m pip install -e .

      - name: Run tests
        run: python -m unittest discover -s tests -v

      - name: Validate MCP bridge
        run: |
          python -m pip install -e ".[mcp]"
          cybernative-mcp --validate
          cybernative-mcp --validate --read-only

      - name: Validate server.json
        run: |
          python - <<'PY'
          import json
          import urllib.request
          from jsonschema import Draft7Validator

          schema_url = "https://raw.githubusercontent.com/modelcontextprotocol/registry/main/docs/reference/server-json/draft/server.schema.json"
          with urllib.request.urlopen(schema_url, timeout=30) as response:
              schema = json.load(response)
          with open("server.json", encoding="utf-8") as fh:
              server = json.load(fh)
          errors = sorted(Draft7Validator(schema).iter_errors(server), key=lambda e: e.path)
          if errors:
              for error in errors:
                  print(f"{'/'.join(map(str, error.path))}: {error.message}")
              raise SystemExit(1)
          print("server.json is valid")
          PY

      - name: Build package
        run: python -m build

      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Authenticate to MCP Registry
        run: ./mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        run: ./mcp-publisher publish
